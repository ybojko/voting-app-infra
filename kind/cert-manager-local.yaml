apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-issuer
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: local-tls
  namespace: voting
spec:
  secretName: local-tls
  commonName: "*.voting.local"
  dnsNames:
    - "*.voting.local"
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
