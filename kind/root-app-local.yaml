apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app-local
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ybojko/voting-app-gitops.git
    targetRevision: master
    path: apps-local
    directory:
      recurse: true
      include: '*.yaml'
      exclude: 'root-app-local.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
